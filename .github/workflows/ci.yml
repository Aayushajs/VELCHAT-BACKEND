name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  proto-compat:
    name: proto FULL_TRANSITIVE compat (§G7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          input: packages/proto
          # Block incompatible schema changes before merge (§G7-1).
          breaking: true
          breaking_against: 'https://github.com/${{ github.repository }}.git#branch=main,subdir=packages/proto'

  security:
    name: SBOM · Trivy · cosign
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless (OIDC)
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (deps + IaC)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
      # Image build (Buildah/Kaniko) + cosign signing run in the release workflow once a
      # registry is configured (P0); keyless signing uses the id-token permission above.
