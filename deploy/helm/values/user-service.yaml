# Per-service overrides for the generic velchat-service chart.
name: user-service
image:
  repository: registry.local/velchat/user-service
  tag: latest
ports:
  http: 3003
  grpc: 50054
  metrics: 9464
envFrom:
  - configMapRef:
      name: user-service-config
  - secretRef:
      name: user-service-secrets
