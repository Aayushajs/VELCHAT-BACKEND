# Local dev infra for integration tests + `pnpm dev`. Matches .env.example credentials.
# Not for production (single-node, dev creds). Bring up: `pnpm infra:up`.
name: velchat-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: velchat
      POSTGRES_PASSWORD: velchat
      POSTGRES_DB: velchat
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U velchat']
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: velchat
      MONGO_INITDB_ROOT_PASSWORD: velchat
    ports:
      - '27017:27017'
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    command: ['valkey-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 15

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: 'true'
      OPENSEARCH_JAVA_OPTS: '-Xms512m -Xmx512m'
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: 'Velchat_dev_1!'
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - '9200:9200'
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -sk -u admin:Velchat_dev_1! https://localhost:9200/_cluster/health || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 15

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: velchatadmin
      MINIO_ROOT_PASSWORD: velchatadminsecret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  mongodata:
  osdata:
  miniodata:
