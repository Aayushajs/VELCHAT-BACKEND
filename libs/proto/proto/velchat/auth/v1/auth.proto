syntax = "proto3";

package velchat.auth.v1;

// Sample auth contract (full surface implemented in P1 per §B2). Identity is the immutable
// account_id (UUIDv7); phone/email are re-verifiable identifiers, never the key (CLAUDE.md §3).
service AuthService {
  rpc IntrospectToken(IntrospectTokenRequest) returns (IntrospectTokenResponse);
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse);
}

message IntrospectTokenRequest {
  string access_token = 1;
}

message IntrospectTokenResponse {
  bool active = 1;
  string account_id = 2;      // identity (§B2)
  string tenant_id = 3;
  string device_id = 4;
  uint64 expires_at = 5;
}

message ListDevicesRequest {
  string account_id = 1;
}

message Device {
  string device_id = 1;
  string display_name = 2;
  bool trusted = 3;
  uint64 added_at = 4;
}

message ListDevicesResponse {
  repeated Device devices = 1;
}
