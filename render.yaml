# Render Blueprint — VelChat backend on the FREE tier (₹0 MVP).
#
# Managed free services (set the secrets in the dashboard, never in git):
#   Postgres → Neon · Mongo → Atlas · Redis/Streams → Upstash · Media → Cloudinary
#   Search   → Atlas Search · Traces/metrics → Grafana Cloud (OTLP)
#
# Free-tier note: Render's free plan spins services down when idle and limits how many run at
# once. For a first deploy, keep the core set (api-gateway, auth, user, chat, realtime, presence,
# notification) and comment the rest until you upgrade. Each service builds from its own Dockerfile
# with the repo root as build context.

envVarGroups:
  - name: velchat-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # Free-tier provider selection
      - key: EVENT_BUS
        value: redis-streams
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: SEARCH_PROVIDER
        value: atlas
      # Secrets — set these in the Render dashboard (sync:false keeps them out of git)
      - key: POSTGRES_URL # Neon connection string (sslmode=require)
        sync: false
      - key: MONGO_URL # MongoDB Atlas SRV string
        sync: false
      - key: VALKEY_URL # Upstash Redis URL (rediss://...) — cache + Redis Streams event bus
        sync: false
      - key: CLOUDINARY_URL # cloudinary://key:secret@cloud
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT # https://otlp-gateway-<region>.grafana.net/otlp
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS # Authorization=Basic <base64 instanceID:token>
        sync: false

services:
  - {
      type: web,
      name: velchat-api-gateway,
      runtime: docker,
      plan: free,
      dockerfilePath: ./docker/api-gateway.Dockerfile,
      dockerContext: .,
      healthCheckPath: /health,
      envVars:
        [
          { fromGroup: velchat-shared },
          { key: SERVICE_NAME, value: api-gateway },
          { key: HTTP_PORT, value: 10000 },
        ],
    }
  - {
